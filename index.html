    <style>
        @media print {
            body * {
                visibility: hidden;
            }
            #print-section, #print-section * {
                visibility: visible;
            }
            #print-section {
                position: absolute;
                left: 0;
                top: 0;
                width: 297mm;
                height: 210mm;
                margin: 0 !important;
                padding: 0 !important;
                background-color: white !important;
            }
            .no-print {
                display: none !important;
            }
            .page-break {
                break-after: page;
            }
        }
        @page {
            size: A4 landscape;
            margin: 0;
        }
        body {
            background-color: #020617;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
